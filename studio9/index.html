<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧶 Crochet AI Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  font-family:'Quicksand',sans-serif;
  background:#FFFCF7;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}

/* BG blobs */
.page-bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    radial-gradient(circle at 10% 15%,rgba(255,123,84,.12) 0%,transparent 40%),
    radial-gradient(circle at 90% 80%,rgba(91,191,255,.12) 0%,transparent 40%),
    radial-gradient(circle at 55% 45%,rgba(255,133,194,.10) 0%,transparent 50%);}

/* floating yarn balls */
.yarn-float{position:fixed;font-size:3rem;opacity:.10;animation:floatY 6s ease-in-out infinite;pointer-events:none;}
.yarn-float:nth-child(1){top:8%;left:5%;animation-delay:0s;}
.yarn-float:nth-child(2){top:15%;right:8%;animation-delay:1s;font-size:2rem;}
.yarn-float:nth-child(3){bottom:12%;left:10%;animation-delay:2s;font-size:2.5rem;}
.yarn-float:nth-child(4){bottom:20%;right:6%;animation-delay:1.5s;}
@keyframes floatY{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-18px) rotate(10deg)}}

/* card */
.card{
  position:relative;z-index:2;
  background:white;border-radius:32px;
  padding:48px 40px 40px;
  max-width:440px;width:90%;
  box-shadow:0 20px 60px rgba(0,0,0,.10);
  border:2.5px solid #FFE8D6;
  text-align:center;
  animation:cardIn .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(.95)}to{opacity:1;transform:none}}

/* logo */
.logo-wrap{
  display:inline-flex;align-items:center;gap:12px;
  background:#FFFCF7;border-radius:999px;padding:10px 28px;
  box-shadow:0 4px 20px rgba(0,0,0,.06);margin-bottom:22px;
  border:2px solid #FFE8D6;
}
.yarn-icon{font-size:1.6rem;animation:spin 4s linear infinite;display:inline-block;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.logo-text{font-family:'Pacifico',cursive;font-size:1.4rem;
  background:linear-gradient(135deg,#FF7B54,#FF9E3D,#FF85C2,#5BBFFF);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* thread row */
.thread-row{display:flex;justify-content:center;gap:5px;margin-bottom:24px;}
.thread{width:26px;height:5px;border-radius:999px;animation:tb 1.8s ease-in-out infinite;}
.thread:nth-child(1){background:#FF7B54;animation-delay:0s}
.thread:nth-child(2){background:#FF9E3D;animation-delay:.15s}
.thread:nth-child(3){background:#FF85C2;animation-delay:.3s}
.thread:nth-child(4){background:#C084FC;animation-delay:.45s}
.thread:nth-child(5){background:#5BBFFF;animation-delay:.6s}
@keyframes tb{0%,100%{transform:scaleX(1)}50%{transform:scaleX(1.5)}}

.subtitle{
  font-size:.95rem;color:#A07090;font-weight:600;
  line-height:1.6;margin-bottom:28px;
}

/* input area */
.input-label{
  display:block;font-size:.78rem;font-weight:700;
  color:#C0390A;letter-spacing:1.5px;text-transform:uppercase;
  margin-bottom:10px;text-align:left;
}
.pw-wrap{position:relative;margin-bottom:18px;}
.pw-input{
  width:100%;padding:16px 50px 16px 20px;
  border:2.5px solid #FFE0D0;border-radius:16px;
  font-family:'Quicksand',sans-serif;font-size:1rem;font-weight:700;
  color:#333;background:#FFFAF8;outline:none;
  transition:border-color .2s,box-shadow .2s;letter-spacing:2px;
}
.pw-input:focus{border-color:#FF7B54;box-shadow:0 0 0 4px rgba(255,123,84,.12);}
.pw-toggle{
  position:absolute;right:16px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;font-size:1.2rem;
  opacity:.5;transition:opacity .2s;
}
.pw-toggle:hover{opacity:1;}

/* error */
.error-msg{
  display:none;background:#FFF0F0;border:2px solid #FFB3B3;
  border-radius:12px;padding:10px 16px;
  font-size:.83rem;font-weight:700;color:#C0390A;
  margin-bottom:16px;animation:shake .3s ease;
}
.error-msg.show{display:block;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* button */
.enter-btn{
  width:100%;padding:18px;border:none;border-radius:18px;
  font-family:'Pacifico',cursive;font-size:1.2rem;color:white;
  cursor:pointer;transition:all .3s ease;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#FF7B54,#E64A19);
  box-shadow:0 10px 28px rgba(255,123,84,.45);
  margin-bottom:20px;
}
.enter-btn::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);transition:left .5s;}
.enter-btn:hover::after{left:100%;}
.enter-btn:hover{transform:translateY(-3px);}
.enter-btn:active{transform:translateY(1px);}
.enter-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}

/* footer note */
.footer-note{font-size:.75rem;color:#CCC;font-weight:600;}
.footer-note span{color:#FF9E3D;}

/* lang switch */
.lang-bar{
  position:fixed;top:14px;right:18px;z-index:100;
  display:flex;gap:6px;
  background:white;border-radius:999px;padding:5px;
  box-shadow:0 4px 18px rgba(0,0,0,.12);border:2px solid #F0E8FF;
}
.lang-btn{
  padding:7px 18px;border-radius:999px;border:none;
  font-family:'Quicksand',sans-serif;font-weight:700;font-size:.82rem;
  cursor:pointer;transition:all .25s ease;color:#AAA;background:transparent;
}
.lang-btn.on{background:linear-gradient(135deg,#FF9E3D,#FF6B35);color:white;box-shadow:0 4px 12px rgba(255,158,61,.4);}

/* lock icon animation */
.lock-icon{font-size:2.5rem;margin-bottom:12px;display:block;animation:lockBounce 2s ease-in-out infinite;}
@keyframes lockBounce{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
</style>
</head>
<body>
<div class="page-bg"></div>
<div class="yarn-float">🧶</div>
<div class="yarn-float">🎀</div>
<div class="yarn-float">🧵</div>
<div class="yarn-float">✨</div>

<!-- LANG -->
<div class="lang-bar">
  <button class="lang-btn on" onclick="setLang('es')">🇪🇸 ES</button>
  <button class="lang-btn"   onclick="setLang('en')">🇺🇸 EN</button>
</div>

<div class="card">
  <div class="logo-wrap">
    <span class="yarn-icon">🧶</span>
    <span class="logo-text">Crochet AI</span>
    <span class="yarn-icon" style="animation-direction:reverse">🧶</span>
  </div>

  <div class="thread-row">
    <div class="thread"></div><div class="thread"></div>
    <div class="thread"></div><div class="thread"></div><div class="thread"></div>
  </div>

  <span class="lock-icon">🔐</span>

  <p class="subtitle" id="subtitle">Acceso exclusivo para clientes ✨<br>Ingresa tu contraseña para continuar</p>

  <label class="input-label" id="pwLabel">🔑 Contraseña</label>
  <div class="pw-wrap">
    <input class="pw-input" type="password" id="pwInput"
      placeholder="••••••••••••"
      onkeydown="if(event.key==='Enter') checkPw()"
      autocomplete="off">
    <button class="pw-toggle" onclick="togglePw()" id="pwEye">👁️</button>
  </div>

  <div class="error-msg" id="errorMsg" id="errorText">❌ Contraseña incorrecta. Inténtalo de nuevo.</div>

  <button class="enter-btn" onclick="checkPw()" id="enterBtn">
    🧶 Entrar al Generador
  </button>

  <p class="footer-note">🔒 Acceso privado · <span>Crochet AI Generator</span></p>
</div>

<script>
let lang = 'es';

const texts = {
  subtitle: {
    es: 'Acceso exclusivo para clientes ✨<br>Ingresa tu contraseña para continuar',
    en: 'Exclusive client access ✨<br>Enter your password to continue'
  },
  pwLabel:  { es: '🔑 Contraseña', en: '🔑 Password' },
  errorMsg: { es: '❌ Contraseña incorrecta. Inténtalo de nuevo.', en: '❌ Wrong password. Please try again.' },
  enterBtn: { es: '🧶 Entrar al Generador', en: '🧶 Enter Generator' },
  footer:   { es: '🔒 Acceso privado · <span>Crochet AI Generator</span>', en: '🔒 Private access · <span>Crochet AI Generator</span>' },
};

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('on'));
  document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`).classList.add('on');
  document.getElementById('subtitle').innerHTML  = texts.subtitle[l];
  document.getElementById('pwLabel').textContent = texts.pwLabel[l];
  document.getElementById('errorMsg').textContent = texts.errorMsg[l];
  document.getElementById('enterBtn').textContent = texts.enterBtn[l] ? `🧶 ${l==='es'?'Entrar al Generador':'Enter Generator'}` : '';
  document.getElementById('enterBtn').innerHTML   = `🧶 ${l==='es'?'Entrar al Generador':'Enter Generator'}`;
  document.querySelector('.footer-note').innerHTML = texts.footer[l];
}

function togglePw() {
  const input = document.getElementById('pwInput');
  const eye   = document.getElementById('pwEye');
  if (input.type === 'password') {
    input.type = 'text';
    eye.textContent = '🙈';
  } else {
    input.type = 'password';
    eye.textContent = '👁️';
  }
}

function checkPw() {
  const val = document.getElementById('pwInput').value;
  const err = document.getElementById('errorMsg');
  const btn = document.getElementById('enterBtn');

  if (val === 'Seattle2026$') {
    btn.innerHTML = lang==='es' ? '✅ Acceso concedido...' : '✅ Access granted...';
    btn.disabled = true;
    err.classList.remove('show');
    setTimeout(() => {
      window.location.href = './studio9/';
    }, 800);
  } else {
    err.classList.remove('show');
    void err.offsetWidth; // re-trigger animation
    err.classList.add('show');
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}
</script>
</body>
</html>
